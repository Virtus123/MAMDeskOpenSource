services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mamdesk
      POSTGRES_PASSWORD: mamdesk
      POSTGRES_DB: mamdesk
    ports:
      - "5432:5432"
    volumes:
      - mamdesk_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app

volumes:
  mamdesk_pgdata:
