# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name {{SITE_DOMAIN}};
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name {{SITE_DOMAIN}};

    ssl_certificate     /etc/letsencrypt/live/{{SITE_DOMAIN}}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{SITE_DOMAIN}}/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root {{WWW_ROOT}};
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /panel/ {
        try_files $uri $uri/ /panel/index.html;
    }

    location = /panel {
        return 301 /panel/;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location = /downloads/quicksupport.html {
        alias {{WWW_ROOT}}/downloads/quicksupport.html;
        default_type text/html;
    }

    location = /downloads/operator.html {
        alias {{WWW_ROOT}}/downloads/operator.html;
        default_type text/html;
    }

    location /downloads/ {
        alias {{WWW_ROOT}}/downloads/;
        add_header Content-Disposition "attachment" always;
        add_header X-Content-Type-Options "nosniff" always;
        types {
            application/vnd.microsoft.portable-executable exe;
            application/octet-stream exe;
        }
        default_type application/octet-stream;
    }

    location = /favicon.ico {
        alias {{WWW_ROOT}}/favicon.ico;
        access_log off;
    }
}
